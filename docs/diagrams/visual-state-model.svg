<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs><linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#09090b"/><stop offset="1" stop-color="#18181b"/></linearGradient><linearGradient id="c" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#059669"/><stop offset="1" stop-color="#10b981"/></linearGradient><linearGradient id="p" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#6d5dfc"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient><filter id="sh"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-opacity=".3"/></filter><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#71717a"/></marker></defs>
  <rect width="1600" height="900" fill="url(#bg3)"/>
  <text x="85" y="88" fill="#a78bfa" font-family="Inter,Segoe UI,sans-serif" font-size="22" font-weight="600" letter-spacing="3">NAXORA</text>
  <text x="85" y="142" fill="#fafafa" font-family="Inter,Segoe UI,sans-serif" font-size="44" font-weight="700">Visual State That Does Not Lose Progress</text>
  <text x="85" y="180" fill="#a1a1aa" font-family="Inter,Segoe UI,sans-serif" font-size="20">Committed clothing changes and generative experiments follow different paths.</text>

  <g filter="url(#sh)"><rect x="90" y="310" width="260" height="250" rx="30" fill="#18181b" stroke="#3f3f46"/><circle cx="220" cy="370" r="30" fill="#27272a"/><text x="220" y="438" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="27" font-weight="700">Original fit</text><text x="220" y="480" text-anchor="middle" fill="#a1a1aa" font-family="Inter,Segoe UI,sans-serif" font-size="16">User-controlled image</text><text x="220" y="510" text-anchor="middle" fill="#a1a1aa" font-family="Inter,Segoe UI,sans-serif" font-size="16">Safe starting point</text></g>
  <path d="M350 435H465" stroke="#71717a" stroke-width="3" marker-end="url(#ar)"/>
  <g filter="url(#sh)"><rect x="465" y="275" width="320" height="320" rx="34" fill="url(#c)"/><rect x="515" y="315" width="220" height="50" rx="25" fill="#fff" opacity=".16"/><text x="625" y="347" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="17" font-weight="700">SOURCE OF TRUTH</text><text x="625" y="432" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="31" font-weight="700">Canonical outfit</text><text x="625" y="480" text-anchor="middle" fill="#d1fae5" font-family="Inter,Segoe UI,sans-serif" font-size="17">Clothing results commit here</text><text x="625" y="511" text-anchor="middle" fill="#d1fae5" font-family="Inter,Segoe UI,sans-serif" font-size="17">Next clothing VTO starts here</text><text x="625" y="542" text-anchor="middle" fill="#d1fae5" font-family="Inter,Segoe UI,sans-serif" font-size="17">Undo / redo restores this state</text></g>

  <path d="M785 370H920" stroke="#71717a" stroke-width="3" marker-end="url(#ar)"/><path d="M1080 515V650H785" fill="none" stroke="#71717a" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#ar)"/>
  <g filter="url(#sh)"><rect x="920" y="275" width="300" height="240" rx="32" fill="url(#p)"/><text x="1070" y="340" text-anchor="middle" fill="#ede9fe" font-family="Inter,Segoe UI,sans-serif" font-size="17" font-weight="700">NON-DESTRUCTIVE</text><text x="1070" y="402" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="29" font-weight="700">Experiment preview</text><text x="1070" y="449" text-anchor="middle" fill="#ede9fe" font-family="Inter,Segoe UI,sans-serif" font-size="16">Shoes · hair · jewelry</text><text x="1070" y="479" text-anchor="middle" fill="#ede9fe" font-family="Inter,Segoe UI,sans-serif" font-size="16">Can be rated without replacing the base</text></g>

  <path d="M1220 395H1330" stroke="#71717a" stroke-width="3" marker-end="url(#ar)"/>
  <g filter="url(#sh)"><rect x="1330" y="300" width="190" height="190" rx="28" fill="#18181b" stroke="#3f3f46"/><text x="1425" y="360" text-anchor="middle" fill="#a78bfa" font-family="Inter,Segoe UI,sans-serif" font-size="16">AGENT CHECK</text><text x="1425" y="405" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="21" font-weight="700">Does it match?</text><text x="1425" y="442" text-anchor="middle" fill="#a1a1aa" font-family="Inter,Segoe UI,sans-serif" font-size="14">Ignore changed pose</text><text x="1425" y="465" text-anchor="middle" fill="#a1a1aa" font-family="Inter,Segoe UI,sans-serif" font-size="14">person + background</text></g>

  <g><rect x="465" y="665" width="320" height="125" rx="26" fill="#18181b" stroke="#3f3f46"/><text x="500" y="711" fill="#a78bfa" font-family="Inter,Segoe UI,sans-serif" font-size="17" font-weight="700">HISTORY</text><text x="500" y="748" fill="#fafafa" font-family="Inter,Segoe UI,sans-serif" font-size="20">Past ← current → future</text><text x="500" y="775" fill="#a1a1aa" font-family="Inter,Segoe UI,sans-serif" font-size="15">Images and conversation move together</text></g>
  <g><rect x="920" y="665" width="600" height="125" rx="26" fill="#18181b" stroke="#3f3f46"/><text x="955" y="711" fill="#fbbf24" font-family="Inter,Segoe UI,sans-serif" font-size="17" font-weight="700">SHOPPING MEMORY</text><text x="955" y="748" fill="#fafafa" font-family="Inter,Segoe UI,sans-serif" font-size="20">Every considered item survives outfit changes</text><text x="955" y="775" fill="#a1a1aa" font-family="Inter,Segoe UI,sans-serif" font-size="15">Saved · tried · checked off · opened to buy</text></g>
  <path d="M785 727H920" stroke="#71717a" stroke-width="3" marker-end="url(#ar)"/>
  <rect x="90" y="825" width="1430" height="2" fill="#27272a"/><text x="805" y="865" text-anchor="middle" fill="#a1a1aa" font-family="Inter,Segoe UI,sans-serif" font-size="17">Result: experimentation stays fun without corrupting the outfit the user already built.</text>
